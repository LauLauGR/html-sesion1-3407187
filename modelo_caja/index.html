<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .padre{
            display: block;
            background-color: oklch(70.2% 0.183 293.541);
            width: 400px;
            height: 400px;
            padding: 40px;
            border: indigo 10px double;
        }

        .hijo{
            display: block;
            background-color: rgb(79, 214, 252);
            width: 200px;
            height: 200px;
            padding: 20px;
            border-top: dashed 5px midnightblue;
            border-right-color: darkslateblue;
            border-right-width: 5px;
            border-right-style: dotted;
        }
    </style>

</head>
<body>
    <div class="padre">
        <div class="hijo">Hijo</div>
    </div>
</body>
</html>
